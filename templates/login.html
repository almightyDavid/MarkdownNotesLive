{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<form method="post">
    {{ form.hidden_tag() }}
    {{ form.username }}
    {% for error in form.username.errors %}
        <div class="error">{{ error }}</div>
    {% endfor %}
    
    {{ form.password }}
    {% for error in form.password.errors %}
        <div class="error">{{ error }}</div>
    {% endfor %}

    <button type="submit">Login</button>
</form>
{% endblock %}
